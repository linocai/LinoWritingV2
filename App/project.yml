name: LinoWriting
options:
  bundleIdPrefix: com.lino.linowriting
  deploymentTarget:
    # v1.1.0 (FF): macOS 14→26 to unlock native Liquid Glass `.glassEffect`
    # (macOS 26 SDK).
    #
    # v1.2.0 (GG, P0): iOS 17→26 to unlock the SAME native `.glassEffect` /
    # `GlassEffectContainer` on iPhone (the iOS redesign is pixel-source with
    # macOS). macOS 26 == iOS 26 share the glass API, so the theme layer
    # (`Views/Theme/*`) un-gates to both platforms (P1). Version number
    # (MARKETING_VERSION) is bumped separately in the wrap-up Phase, not here,
    # to avoid mid-build health-endpoint version drift.
    # NOTE (author ruling): the iOS redesign shipped under MARKETING_VERSION
    # 1.1.0 (not bumped — "v1.2.0"/GG was only the iteration codename at the
    # time). v1.2.0 (HH) P9 is the actual real 1.2.0 release, bumped below.
    macOS: "26.0"
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: minimal
    # v0.9 X-1: ad-hoc 签名(`CODE_SIGNING_ALLOWED: NO` + post-build
    # `codesign --sign -`)正式 supersede,切换到 Xcode Automatic
    # signing。Apple Developer Program 已注册(Team ID HX73DFL88G),
    # 本机 Xcode → Settings → Accounts 登录 linocai@hotmail.com,
    # "Apple Development" cert 自动下发,iOS + macOS Debug/Release
    # 全部走同一条 Automatic 路径。
    #
    # macOS Release 走 Automatic 时签的是 "Apple Development" cert;
    # 真正分发用的 "Developer ID Application" cert + notarize
    # 由 X-2 phase 的 ./scripts/release-macos.sh 在 build 之后
    # `codesign --force --options runtime --timestamp --sign
    # "Developer ID Application: ..."` 覆盖签。`--force` 会替换掉
    # build 阶段的 Apple Development cert,notarize 校验最终签名。
    #
    # ENABLE_HARDENED_RUNTIME: YES 是 notarize 的硬性要求,这里全局开,
    # 即使 Debug build 也带 hardened runtime —— 避免 Debug 跑通但
    # Release notarize 时才暴露 entitlement / private-API 冲突。
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: HX73DFL88G
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  LinoWriting:
    type: application
    supportedDestinations:
      - macOS
      - iOS
    sources:
      - path: LinoWriting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lino.linowriting.LinoWriting
        PRODUCT_NAME: LinoI
        # v0.9.2 (Plan A revert): v0.9.1 wired CODE_SIGN_ENTITLEMENTS to add a
        # `keychain-access-groups` entitlement (data-protection keychain). On a
        # Developer ID app that forced Xcode to embed a *device-locked
        # development* provisioning profile; release-macos.sh then re-signed
        # with the Developer ID cert → cert/profile type mismatch → AMFI
        # rejected launchd spawn (POSIX 163) → app would not open. Reverted to
        # the v0.9 model: NO CODE_SIGN_ENTITLEMENTS, file-based login keychain,
        # and rely on the now-stable Developer ID signature so the macOS
        # keychain "Always Allow" choice persists across launches (it never
        # stuck under ad-hoc signing because every rebuild changed the
        # designated requirement). The entitlements file stays on disk but is
        # intentionally NOT referenced — keeping it dormant avoids re-embedding
        # a profile. See PROJECT_PLAN §5.CC + reviewer audit.
        # Keep the Swift module name as LinoWriting so internal imports
        # (`@testable import LinoWriting` etc.) and 52 source files don't
        # need a sweeping rename just because the app bundle is now LinoI.
        PRODUCT_MODULE_NAME: LinoWriting
        INFOPLIST_FILE: LinoWriting/Resources/Info.plist
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator macosx"
        # v1.2.0 (GG, P0): drop iPad. The iOS redesign is an iPhone-only
        # portrait NavigationStack app; the iPad NavigationSplitView dispatch
        # in WorkspaceView is deleted and Info.plist's `~ipad` orientation
        # block removed. "1" = iPhone only.
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/Frameworks"

  LinoWritingTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LinoWritingTests
    dependencies:
      - target: LinoWriting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lino.linowriting.LinoWritingTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LinoI.app/Contents/MacOS/LinoI"
        GENERATE_INFOPLIST_FILE: YES

  # R-4 (v0.8) — iOS-only logic test bundle. Mirrors LinoWritingTests but
  # runs inside an iOS Simulator so we can exercise:
  #   * NavigationSplitView + size class transitions (R-1 / R-2)
  #   * iOS sheet presentationDetents defaults (R-3)
  #   * UIDocumentPicker bridge entry points (R-3 FileSaver)
  #   * long-press / swipe affordance store contracts (R-3)
  # Plus a re-verification of platform-neutral store logic (ErrorBus,
  # ChapterEditorStore, ChapterSplitter) on the iOS runtime to catch
  # iOS-only dialect bugs.
  #
  # Logic tests only (XCTest, not XCUITest) — no new SPM dependencies
  # (§5.R.6 forbids ViewInspector / SnapshotTesting). Real SwiftUI view
  # tree behaviour stays in the human Simulator pass per §5.R.8.
  LinoWritingTestsIOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LinoWritingTestsIOS
      # Reuse the hand-rolled APIClientProtocol mock from the macOS bundle
      # rather than maintaining a parallel copy. xcodegen will add the
      # file to both targets' compile lists; the file itself is platform
      # neutral (no AppKit / UIKit imports).
      - path: LinoWritingTests/MockAPIClient.swift
    dependencies:
      - target: LinoWriting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lino.linowriting.LinoWritingTestsIOS
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LinoI.app/LinoI"
        GENERATE_INFOPLIST_FILE: YES
        # v1.2.0 (GG, P0): match the app target — iPhone only. Without this
        # xcodegen defaults the test bundle to "1,2" (iPad nominally claimed),
        # harmless for a logic-test bundle but kept consistent with the app.
        TARGETED_DEVICE_FAMILY: "1"
        # Restrict to iphone* platforms only so a `-destination
        # platform=macOS` invocation auto-skips building this test
        # bundle. Without this Xcode tries to resolve TEST_HOST against
        # the macOS slice of LinoI.app (which doesn't include the
        # iphoneos PlugIns dir) and fails the whole build.
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO

# Schemes — explicit so the macOS test invocation doesn't drag the iOS
# test bundle into its TestAction (which would fail the build because
# TEST_HOST resolves to an iphoneos product). The Xcode auto-scheme tries
# to include every test bundle; we override that with two named schemes.
schemes:
  # Default scheme — exposes the app + both test bundles for Xcode UI use
  # (developer can pick destination + only-testing filter manually).
  LinoWriting:
    build:
      targets:
        LinoWriting: all
        LinoWritingTests: [test]
        LinoWritingTestsIOS: [test]
    test:
      targets:
        - LinoWritingTests
        - LinoWritingTestsIOS
  # macOS-only scheme for CLI `xcodebuild test`. Drops the iOS test
  # bundle so a `-destination platform=macOS` invocation doesn't try to
  # build it against the macOS slice.
  LinoWriting-macOS:
    build:
      targets:
        LinoWriting: all
        LinoWritingTests: [test]
    test:
      targets:
        - LinoWritingTests
  # iOS-only scheme for CLI `xcodebuild test -destination 'platform=iOS
  # Simulator,...'`. Mirrors the macOS one in shape.
  LinoWriting-iOS:
    build:
      targets:
        LinoWriting: all
        LinoWritingTestsIOS: [test]
    test:
      targets:
        - LinoWritingTestsIOS
