name: LinoWriting
options:
  bundleIdPrefix: com.lino.linowriting
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: minimal
    # Build phase doesn't sign(Manual + 无 team 在 Xcode 14+ 上会被阻拦)。
    # Ad-hoc 签名在 build 完成之后用 codesign 命令补:
    #   codesign --force --deep --sign - /path/to/LinoI.app
    # 这样 macOS Keychain 能把 LinoI 识别为受信任 app,避免每次启动
    # 都弹"是否允许 LinoI 访问钥匙串项"的授权窗。
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    ENABLE_HARDENED_RUNTIME: NO
    MARKETING_VERSION: "0.8"
    CURRENT_PROJECT_VERSION: "1"

targets:
  LinoWriting:
    type: application
    supportedDestinations:
      - macOS
      - iOS
    sources:
      - path: LinoWriting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lino.linowriting.LinoWriting
        PRODUCT_NAME: LinoI
        # Keep the Swift module name as LinoWriting so internal imports
        # (`@testable import LinoWriting` etc.) and 52 source files don't
        # need a sweeping rename just because the app bundle is now LinoI.
        PRODUCT_MODULE_NAME: LinoWriting
        INFOPLIST_FILE: LinoWriting/Resources/Info.plist
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator macosx"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/Frameworks"

  LinoWritingTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LinoWritingTests
    dependencies:
      - target: LinoWriting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lino.linowriting.LinoWritingTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LinoI.app/Contents/MacOS/LinoI"
        GENERATE_INFOPLIST_FILE: YES

  # R-4 (v0.8) — iOS-only logic test bundle. Mirrors LinoWritingTests but
  # runs inside an iOS Simulator so we can exercise:
  #   * NavigationSplitView + size class transitions (R-1 / R-2)
  #   * iOS sheet presentationDetents defaults (R-3)
  #   * UIDocumentPicker bridge entry points (R-3 FileSaver)
  #   * long-press / swipe affordance store contracts (R-3)
  # Plus a re-verification of platform-neutral store logic (ErrorBus,
  # ChapterEditorStore, ChapterSplitter) on the iOS runtime to catch
  # iOS-only dialect bugs.
  #
  # Logic tests only (XCTest, not XCUITest) — no new SPM dependencies
  # (§5.R.6 forbids ViewInspector / SnapshotTesting). Real SwiftUI view
  # tree behaviour stays in the human Simulator pass per §5.R.8.
  LinoWritingTestsIOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LinoWritingTestsIOS
      # Reuse the hand-rolled APIClientProtocol mock from the macOS bundle
      # rather than maintaining a parallel copy. xcodegen will add the
      # file to both targets' compile lists; the file itself is platform
      # neutral (no AppKit / UIKit imports).
      - path: LinoWritingTests/MockAPIClient.swift
    dependencies:
      - target: LinoWriting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lino.linowriting.LinoWritingTestsIOS
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LinoI.app/LinoI"
        GENERATE_INFOPLIST_FILE: YES
        # Restrict to iphone* platforms only so a `-destination
        # platform=macOS` invocation auto-skips building this test
        # bundle. Without this Xcode tries to resolve TEST_HOST against
        # the macOS slice of LinoI.app (which doesn't include the
        # iphoneos PlugIns dir) and fails the whole build.
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO

# Schemes — explicit so the macOS test invocation doesn't drag the iOS
# test bundle into its TestAction (which would fail the build because
# TEST_HOST resolves to an iphoneos product). The Xcode auto-scheme tries
# to include every test bundle; we override that with two named schemes.
schemes:
  # Default scheme — exposes the app + both test bundles for Xcode UI use
  # (developer can pick destination + only-testing filter manually).
  LinoWriting:
    build:
      targets:
        LinoWriting: all
        LinoWritingTests: [test]
        LinoWritingTestsIOS: [test]
    test:
      targets:
        - LinoWritingTests
        - LinoWritingTestsIOS
  # macOS-only scheme for CLI `xcodebuild test`. Drops the iOS test
  # bundle so a `-destination platform=macOS` invocation doesn't try to
  # build it against the macOS slice.
  LinoWriting-macOS:
    build:
      targets:
        LinoWriting: all
        LinoWritingTests: [test]
    test:
      targets:
        - LinoWritingTests
  # iOS-only scheme for CLI `xcodebuild test -destination 'platform=iOS
  # Simulator,...'`. Mirrors the macOS one in shape.
  LinoWriting-iOS:
    build:
      targets:
        LinoWriting: all
        LinoWritingTestsIOS: [test]
    test:
      targets:
        - LinoWritingTestsIOS
