services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: novelos
      POSTGRES_USER: novelos
      POSTGRES_PASSWORD: novelos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelos -d novelos"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://novelos:novelos@postgres:5432/novelos
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
