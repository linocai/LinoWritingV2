# Nginx site for Lino Writing v2 backend.
# Deployed to: /etc/nginx/sites-available/linowriting  (+ symlink in sites-enabled/)
# Reverse-proxies HTTPS lw.linotsai.top -> 127.0.0.1:8787 (uvicorn).
#
# Conventions match neighbor sites (/etc/nginx/sites-available/linofinance, 100j).
# Backed up before edit per hz_info.md §7.

server {
    listen 80;
    listen [::]:80;
    server_name lw.linotsai.top;

    # ACME http-01 challenge passthrough (certbot --nginx 会自动管，这里留个明确入口)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lw.linotsai.top;

    ssl_certificate     /etc/letsencrypt/live/lw.linotsai.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lw.linotsai.top/privkey.pem;

    # SSE 长连接必须关 buffer + 拉长 timeout
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # 防 LinoI 客户端 large body(批量导入章节)
    client_max_body_size 8m;

    # HSTS / X-Content-Type-Options 由 T-2 后端 middleware 注入，Nginx 不重复加

    # access / error log — 与邻居分开，方便排查
    access_log /var/log/nginx/linowriting.access.log;
    error_log  /var/log/nginx/linowriting.error.log;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 友好：关闭 chunked-buffering 之外，给客户端 keep-alive 留口子
        proxy_set_header Connection        "";
    }
}
